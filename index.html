<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAM-MAN Route Planner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f7f7;
      color: #333;
      text-align: center;
    }

    header {
      background: #4b0082;
      color: #fff;
      padding: 20px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    header img {
      width: 60px;
      margin-right: 15px;
      animation: idlePulse 2s infinite ease-in-out;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    @keyframes idlePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    #addresses {
      margin: 20px auto;
      max-width: 600px;
    }

    .addressBox {
      display: flex;
      margin: 10px 0;
    }

    .addressBox input {
      flex: 1;
      padding: 10px;
      font-size: 1rem;
      border: 2px solid #4b0082;
      border-radius: 4px;
    }

    .addressBox button {
      margin-left: 10px;
      background: #ff4500;
      color: #fff;
      border: none;
      padding: 0 12px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
    }

    #controls {
      margin: 20px;
    }

    #optimizeBtn {
      background: #4b0082;
      color: #fff;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      border-radius: 6px;
      transition: transform 0.2s ease;
    }

    #optimizeBtn:active {
      transform: scale(0.95);
    }

    #result {
      margin: 20px;
      font-size: 1.1rem;
    }

    a.mapsLink {
      display: inline-block;
      margin-top: 15px;
      background: #008cba;
      color: #fff;
      padding: 12px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <img id="rammanIcon" src="https://i.imgur.com/URm4ZcN.png" alt="RAM-MAN">
  <h1>RAM-MAN Route Planner</h1>
</header>

<div id="addresses"></div>

<div id="controls">
  <button onclick="addAddressInput()">Add Address</button>
  <button id="optimizeBtn" onclick="optimizeRoute()">Optimize Route</button>
</div>

<div id="result"></div>

<script>
  let addressCount = 0;
  let addressInputs = [];

  function addAddressInput(value = '') {
    addressCount++;
    const container = document.getElementById('addresses');
    const div = document.createElement('div');
    div.className = 'addressBox';
    div.id = 'addrBox' + addressCount;

    const input = document.createElement('input');
    input.placeholder = 'Enter address ' + addressCount;
    input.value = value;

    const removeBtn = document.createElement('button');
    removeBtn.textContent = '✕';
    removeBtn.onclick = () => {
      container.removeChild(div);
      addressInputs = addressInputs.filter(el => el !== input);
    };

    div.appendChild(input);
    div.appendChild(removeBtn);
    container.appendChild(div);
    addressInputs.push(input);
  }

  // Start with 3 boxes
  addAddressInput();
  addAddressInput();
  addAddressInput();

  async function optimizeRoute() {
    const addresses = addressInputs
      .map(input => input.value.trim())
      .filter(val => val !== '');

    if (addresses.length < 2) {
      alert('Please enter at least 2 addresses to optimize!');
      return;
    }

    document.getElementById('result').innerHTML = 'RAM-MAN is calculating… 🦸‍♂️';

    try {
      const key = 'YOUR_GOOGLE_MAPS_API_KEY';
      const origins = addresses.join('|');
      const destinations = origins;

      const response = await fetch(
        `https://maps.googleapis.com/maps/api/distancematrix/json?origins=${encodeURIComponent(origins)}&destinations=${encodeURIComponent(destinations)}&key=${key}&traffic_model=best_guess&departure_time=now`
      );

      const data = await response.json();

      if (data.status !== 'OK') {
        throw new Error('Distance Matrix API error');
      }

      // Simple nearest-neighbor heuristic
      let currentIdx = 0;
      let routeOrder = [0];
      let unused = addresses.map((_, i) => i).filter(i => i !== 0);

      while (unused.length) {
        const last = routeOrder[routeOrder.length - 1];
        let nearest, minDist = Infinity;
        unused.forEach(i => {
          const travel = data.rows[last].elements[i].duration.value;
          if (travel < minDist) {
            minDist = travel;
            nearest = i;
          }
        });
        routeOrder.push(nearest);
        unused = unused.filter(i => i !== nearest);
      }

      const ordered = routeOrder.map(i => addresses[i]);

      // Build Google Maps directions link
      const base = 'https://www.google.com/maps/dir/?api=1';
      const origin = encodeURIComponent(ordered[0]);
      const waypoints = ordered.slice(1, -1).map(a => encodeURIComponent(a)).join('|');
      const destination = encodeURIComponent(ordered[ordered.length - 1]);

      const link = `${base}&origin=${origin}&destination=${destination}&waypoints=${waypoints}`;

      document.getElementById('result').innerHTML = `
        <strong>Route Ready! 🚗</strong><br>
        Total stops: ${ordered.length}<br>
        <a class="mapsLink" href="${link}" target="_blank">Open in Google Maps</a>
      `;
    } catch (err) {
      document.getElementById('result').textContent = 'Error calculating route.';
      console.error(err);
    }
  }
</script>

</body>
</html>
