<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAM-MAN Ultimate</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Intro Screen (Placeholder) -->
<div id="introScreen">
  <h1>RAM-MAN 🦸‍♂️</h1>
  <button id="skipIntro">Enter App</button>
</div>

<!-- Main App -->
<div id="appContainer">
  <header>
    <img src="https://i.imgur.com/URm4ZcN.png" alt="RAM-MAN">
    <h1>RAM-MAN Ultimate</h1>
  </header>

  <!-- Tabs -->
  <div class="tab">
    <button class="tablink active" onclick="openTab('routePlanner', this)">Route Planner</button>
    <button class="tablink" onclick="openTab('newBusiness', this)">New Business Tracker</button>
  </div>

  <!-- Route Planner -->
  <div id="routePlanner">
    <div id="addresses"></div>
    <button onclick="addAddressInput()">Add Address</button>
    <button id="optimizeBtn" onclick="optimizeRoute()">Optimize Route</button>
    <div id="result"></div>
  </div>

  <!-- New Business Tracker -->
  <div id="newBusinessTracker" style="display:none;">
    <div id="trackerRows"></div>
    <button onclick="addTrackerRow()">Add Entry</button>
    <button onclick="exportTracker()">Export CSV</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
